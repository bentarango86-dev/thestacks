<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Stacks — Stacks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c2340">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="The Stacks" class="logo-mark">
    <div class="titles">
      <h1>The Stacks</h1>
      <p>your personal record ledger</p>
    </div>
    <div class="header-actions">
      <span id="userEmail" style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(12,35,64,0.55);"></span>
      <button class="btn btn-ghost" id="helpBtn" style="display:none;"><i class="ti ti-help-circle" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Help</button>
      <button class="btn btn-ghost" id="securityBtn" style="display:none;"><i class="ti ti-shield-lock" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Security</button>
      <button class="btn btn-ghost" id="signOutBtn" style="display:none;">Sign out</button>
    </div>
  </header>

  <div id="appBody" style="display:none;">

  <div class="view-tabs">
    <a href="index.html" class="tab-btn active"><i class="ti ti-stack-2" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>Stacks</a>
    <a href="records.html" class="tab-btn"><i class="ti ti-list" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>All Records</a>
  </div>

  <div class="home-search-row" id="homeSearchRow">
    <div class="home-search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="homeSearch" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="quick-row" id="homeQuickRow">
      <button type="button" class="chip-btn" id="randomBtn"><i class="ti ti-dice-5"></i>Random Record</button>
      <a href="#" class="chip-btn" id="continueBtn" style="display:none;"><i class="ti ti-history"></i><span id="continueLabel"></span></a>
      <button class="btn btn-primary" id="addBtn" style="margin-left:auto;">+ Add Record</button>
    </div>
  </div>

  <div class="controls" id="stacksControls">
    <select id="stackSortBy">
      <option value="genre-asc">Genre A–Z</option>
      <option value="count-desc">Most records</option>
      <option value="count-asc">Fewest records</option>
    </select>
  </div>

  <div class="controls" id="drillControls" style="display:none;">
    <a href="index.html" class="btn btn-ghost"><i class="ti ti-arrow-left" style="vertical-align:-2px; margin-right:3px;"></i>All Genres</a>
    <select id="drillSortBy">
      <option value="added-desc">Recently added</option>
      <option value="artist-asc">Artist A–Z</option>
      <option value="year-desc">Year (newest)</option>
      <option value="year-asc">Year (oldest)</option>
      <option value="value-desc">Value (high–low)</option>
    </select>
    <button class="btn btn-primary" id="addBtnDrill" style="margin-left:auto;">+ Add Record</button>
  </div>

  <div id="searchResultsSection" style="display:none;">
    <h2 class="section-heading" id="searchResultsHeading"></h2>
    <div class="gallery-grid" id="searchResultsGrid"></div>
  </div>

  <div id="recentlyAddedSection" style="margin-bottom:28px;">
    <h2 class="section-heading">Recently Added</h2>
    <div id="recentlyAddedRow" style="display:flex; gap:14px; overflow-x:auto; padding-bottom:4px;"></div>
  </div>

  <div class="stacks-grid" id="stacksGrid"></div>
  <h2 id="drillHeading" style="display:none; font-family:'Fraunces',serif; font-weight:700; font-size:22px; color:var(--ink); margin-bottom:16px;"></h2>
  <div class="gallery-grid" id="drillCards" style="display:none;"></div>
  </div>
</div>

<div id="modals-root"></div>

<script src="modals.js"></script>
<script src="app.js"></script>
<script>
// ---- STACKS PAGE ----
// (iconForGenre, renderGalleryGrid, handleGalleryTap, openDetailModal live in app.js — shared with records.html)

// Drilling into a stack stays on this page (index.html?genre=X) rather than
// jumping to the All Records table — it's part of the Stacks browsing
// experience, not the spreadsheet view. Remember it so "Continue Browsing"
// can bring the person right back next visit.
function exploreGenre(genre, tileEl) {
  saveLastGenre(genre);
  const go = () => { window.location.href = 'index.html?genre=' + encodeURIComponent(genre); };
  if (tileEl) {
    tileEl.classList.add('pulling');
    setTimeout(go, 140);
  } else {
    go();
  }
}

// Small deterministic tilt per genre name so the shelf reads as records
// actually dropped into place rather than a uniform grid of tiles.
function jitterForGenre(genre) {
  const s = genre || '';
  let hash = 0;
  for (let i = 0; i < s.length; i++) hash = (hash * 31 + s.charCodeAt(i)) | 0;
  return (Math.abs(hash) % 7) - 3; // -3..3 degrees
}

function saveLastGenre(genre) {
  try { localStorage.setItem('stacks:lastGenre', genre); } catch (e) { /* non-fatal */ }
}
function loadLastGenre() {
  try { return localStorage.getItem('stacks:lastGenre'); } catch (e) { return null; }
}

const urlParams = new URLSearchParams(window.location.search);
const drillGenre = urlParams.get('genre');

// ---- Sort persistence (survives reloads and navigation) ----
function loadSavedSort(key, fallback) {
  try {
    const saved = localStorage.getItem(key);
    return saved || fallback;
  } catch (e) { return fallback; }
}
function saveSort(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* private browsing etc — non-fatal */ }
}

el('stackSortBy').value = loadSavedSort('stacks:stackSort', 'genre-asc');
el('drillSortBy').value = loadSavedSort('stacks:drillSort', 'artist-asc');

el('stackSortBy').addEventListener('change', () => {
  saveSort('stacks:stackSort', el('stackSortBy').value);
  renderStacksGrid();
});
el('drillSortBy').addEventListener('change', () => {
  saveSort('stacks:drillSort', el('drillSortBy').value);
  renderDrillCards();
});
el('addBtnDrill').addEventListener('click', () => openModal(null));

function renderStacksGrid() {
  if (records.length === 0) {
    el('stacksGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1;">The crate is empty. Add your first record.</div>`;
    return;
  }

  const groups = {};
  records.forEach(r => {
    const key = r.genre || '__none__';
    (groups[key] = groups[key] || []).push(r);
  });

  const stackSort = el('stackSortBy').value;
  const entries = Object.entries(groups).sort((a, b) => {
    if (a[0] === '__none__') return 1;
    if (b[0] === '__none__') return -1;
    switch (stackSort) {
      case 'count-desc': return b[1].length - a[1].length;
      case 'count-asc': return a[1].length - b[1].length;
      default: return a[0].localeCompare(b[0]);
    }
  });

  el('stacksGrid').innerHTML = entries.map(([genre, list]) => {
    // Respect an explicit star, but otherwise prefer any record that
    // actually has cover art over just taking whichever came first —
    // a genre shouldn't show a blank tile when art exists in the group.
    const face = list.find(r => r.isFace) || list.find(r => r.coverUrl) || list[0];
    const label = genre === '__none__' ? 'No genre' : genre;
    const fallbackHtml = `<div class="face-fallback"><i class="ti ${iconForGenre(genre)}"></i></div>`;
    const faceInner = face.coverUrl
      ? `<img src="${escapeAttr(face.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='${fallbackHtml.replace(/"/g, '&quot;').replace(/'/g, "\\'")}'">`
      : fallbackHtml;

    // Pick real records for the back layers, preferring ones with cover art
    // so the stack reflects what's actually in the genre, not filler.
    // Layer count scales with how many records are actually in the genre —
    // bigger piles look bigger, capped at 3 back layers so it never gets messy.
    const layerCount = list.length >= 50 ? 3 : list.length >= 10 ? 2 : list.length >= 3 ? 1 : 0;
    const others = list.filter(r => r.id !== face.id);
    const withArt = others.filter(r => r.coverUrl);
    const withoutArt = others.filter(r => !r.coverUrl);
    const backLayers = [...withArt, ...withoutArt].slice(0, layerCount);

    const sleeveInner = r => r && r.coverUrl
      ? `<img src="${escapeAttr(r.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML=''">`
      : '';

    const badge = list.length > 9
      ? `<div class="stack-badge">${list.length > 99 ? '99+' : list.length}</div>`
      : '';

    return `
      <div class="stack-tile" onclick='exploreGenre(${JSON.stringify(genre)}, this)'>
        <div class="stack-visual" style="--jitter:${jitterForGenre(genre)}deg;">
          ${backLayers[2] ? `<div class="stack-sleeve s4">${sleeveInner(backLayers[2])}</div>` : ''}
          ${backLayers[1] ? `<div class="stack-sleeve s3">${sleeveInner(backLayers[1])}</div>` : ''}
          ${backLayers[0] ? `<div class="stack-sleeve s2">${sleeveInner(backLayers[0])}</div>` : ''}
          <div class="stack-sleeve face-sleeve">${faceInner}</div>
          ${badge}
        </div>
        <div class="stack-label">
          <h3>${escapeHtml(label)}</h3>
          <div class="stack-count">${list.length} record${list.length === 1 ? '' : 's'}</div>
        </div>
      </div>
    `;
  }).join('');

  armLazyImageTimeouts(el('stacksGrid'));
}

function renderDrillCards() {
  const list = records.filter(r => drillGenre === '__none__' ? !r.genre : r.genre === drillGenre);
  const label = drillGenre === '__none__' ? 'No genre' : drillGenre;
  el('drillHeading').textContent = `${label} — ${list.length} record${list.length === 1 ? '' : 's'}`;

  const sortBy = el('drillSortBy').value;
  list.sort((a, b) => {
    switch (sortBy) {
      case 'artist-asc': return a.artist.localeCompare(b.artist);
      case 'year-desc': return (parseInt(b.year)||0) - (parseInt(a.year)||0);
      case 'year-asc': return (parseInt(a.year)||0) - (parseInt(b.year)||0);
      case 'value-desc': return (b.price||0) - (a.price||0);
      default: return (b.addedAt||0) - (a.addedAt||0);
    }
  });

  renderGalleryGrid(el('drillCards'), list);
}

function renderRecentlyAdded() {
  const recent = [...records].sort((a, b) => (b.addedAt||0) - (a.addedAt||0)).slice(0, 8);
  if (recent.length === 0) {
    el('recentlyAddedSection').style.display = 'none';
    return;
  }
  el('recentlyAddedRow').innerHTML = recent.map(r => {
    const cover = r.coverUrl
      ? `<img src="${escapeAttr(r.coverUrl)}" alt="" loading="lazy" style="width:84px; height:84px; object-fit:cover; border-radius:5px;" onerror="this.outerHTML='<div style=&quot;width:84px;height:84px;border-radius:5px;background:var(--navy);display:flex;align-items:center;justify-content:center;&quot;><i class=&quot;ti ${iconForGenre(r.genre)}&quot; style=&quot;color:var(--amber);font-size:24px;&quot;></i></div>'">`
      : `<div style="width:84px; height:84px; border-radius:5px; background:var(--navy); display:flex; align-items:center; justify-content:center;"><i class="ti ${iconForGenre(r.genre)}" style="color:var(--amber); font-size:24px;"></i></div>`;
    return `
      <div style="flex-shrink:0; width:84px; cursor:pointer;" onclick='editRecord("${r.id}")'>
        ${cover}
        <div style="font-size:11.5px; font-weight:700; color:var(--ink); margin-top:6px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(r.album)}</div>
        <div style="font-size:10.5px; color:#8a7d63; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(r.artist)}</div>
      </div>
    `;
  }).join('');
}

// ---- SEARCH (primary navigation on the homepage) ----
function renderSearchResults() {
  const q = el('homeSearch').value.trim().toLowerCase();
  if (!q) {
    el('searchResultsSection').style.display = 'none';
    el('recentlyAddedSection').style.display = 'block';
    el('stacksGrid').style.display = 'grid';
    return true; // no query — caller should render the normal homepage
  }
  const matches = records.filter(r =>
    r.album.toLowerCase().includes(q) ||
    r.artist.toLowerCase().includes(q) ||
    (r.genre || '').toLowerCase().includes(q)
  );
  el('recentlyAddedSection').style.display = 'none';
  el('stacksGrid').style.display = 'none';
  el('searchResultsSection').style.display = 'block';
  el('searchResultsHeading').textContent = `${matches.length} result${matches.length === 1 ? '' : 's'}`;
  renderGalleryGrid(el('searchResultsGrid'), matches);
  return false;
}
el('homeSearch').addEventListener('input', () => {
  if (drillGenre) return; // search only drives the top-level homepage view
  if (renderSearchResults()) renderStacksGrid();
});

el('randomBtn').addEventListener('click', openRandomRecord);

function renderPage() {
  renderStats();
  if (drillGenre) {
    el('homeSearchRow').style.display = 'none';
    el('stacksControls').style.display = 'none';
    el('drillControls').style.display = 'flex';
    el('stacksGrid').style.display = 'none';
    el('recentlyAddedSection').style.display = 'none';
    el('searchResultsSection').style.display = 'none';
    el('drillHeading').style.display = 'block';
    el('drillCards').style.display = 'grid';
    renderDrillCards();
  } else {
    el('homeSearchRow').style.display = 'block';
    el('homeSearch').placeholder = `Search within your ${records.length} record${records.length === 1 ? '' : 's'}`;

    const lastGenre = loadLastGenre();
    const lastGenreStillExists = lastGenre && records.some(r => (r.genre || '') === lastGenre || (lastGenre === '__none__' && !r.genre));
    if (lastGenreStillExists) {
      el('continueLabel').textContent = `Continue browsing ${lastGenre === '__none__' ? 'No genre' : lastGenre}`;
      el('continueBtn').href = 'index.html?genre=' + encodeURIComponent(lastGenre);
      el('continueBtn').style.display = 'inline-flex';
    } else {
      el('continueBtn').style.display = 'none';
    }

    if (renderSearchResults()) {
      renderRecentlyAdded();
      renderStacksGrid();
    }
  }
}
</script>
</body>
</html>
