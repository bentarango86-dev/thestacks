<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Stacks — Stacks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c2340">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="The Stacks" class="logo-mark">
    <div class="titles">
      <h1>The Stacks</h1>
      <p>your personal record ledger</p>
    </div>
    <div class="header-actions">
      <span id="userEmail" style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(12,35,64,0.55);"></span>
      <button class="btn btn-ghost" id="helpBtn" style="display:none;"><i class="ti ti-help-circle" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Help</button>
      <button class="btn btn-ghost" id="securityBtn" style="display:none;"><i class="ti ti-shield-lock" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Security</button>
      <button class="btn btn-ghost" id="signOutBtn" style="display:none;">Sign out</button>
    </div>
  </header>

  <div id="appBody" style="display:none;">

  <div class="stats" id="stats"></div>

  <div class="view-tabs">
    <a href="index.html" class="tab-btn active"><i class="ti ti-stack-2" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>Stacks</a>
    <a href="records.html" class="tab-btn"><i class="ti ti-list" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>All Records</a>
  </div>

  <div class="controls" id="stacksControls">
    <select id="stackSortBy">
      <option value="genre-asc">Genre A–Z</option>
      <option value="count-desc">Most records</option>
      <option value="count-asc">Fewest records</option>
    </select>
    <button class="btn btn-primary" id="addBtn" style="margin-left:auto;">+ Add Record</button>
  </div>

  <div class="controls" id="drillControls" style="display:none;">
    <a href="index.html" class="btn btn-ghost">← Back to Stacks</a>
    <select id="drillSortBy">
      <option value="added-desc">Recently added</option>
      <option value="artist-asc">Artist A–Z</option>
      <option value="year-desc">Year (newest)</option>
      <option value="year-asc">Year (oldest)</option>
      <option value="value-desc">Value (high–low)</option>
    </select>
    <button class="btn btn-primary" id="addBtnDrill" style="margin-left:auto;">+ Add Record</button>
  </div>

  <div class="stacks-grid" id="stacksGrid"></div>
  <h2 id="drillHeading" style="display:none; font-family:'Fraunces',serif; font-weight:700; font-size:22px; color:var(--ink); margin-bottom:16px;"></h2>
  <div class="drill-grid" id="drillCards" style="display:none;"></div>
  </div>
</div>

<div id="modals-root"></div>

<script src="modals.js"></script>
<script src="app.js"></script>
<script>
// ---- STACKS PAGE ----
function iconForGenre(genre) {
  const g = (genre || '').toLowerCase();
  const map = [
    [['rock', 'grunge', 'punk', 'metal'], 'ti-guitar-pick'],
    [['jazz', 'blues'], 'ti-piano'],
    [['classical', 'orchestra'], 'ti-violin'],
    [['electronic', 'techno', 'house', 'edm'], 'ti-wave-square'],
    [['hip hop', 'rap'], 'ti-microphone-2'],
    [['country', 'folk', 'americana'], 'ti-guitar-pick'],
    [['soundtrack', 'score'], 'ti-movie'],
  ];
  for (const [keywords, icon] of map) {
    if (keywords.some(k => g.includes(k))) return icon;
  }
  return 'ti-music';
}

// Drilling into a stack stays on this page (index.html?genre=X) rather than
// jumping to the All Records table — it's part of the Stacks browsing
// experience, not the spreadsheet view.
function exploreGenre(genre) {
  window.location.href = 'index.html?genre=' + encodeURIComponent(genre);
}

const urlParams = new URLSearchParams(window.location.search);
const drillGenre = urlParams.get('genre');

// ---- Sort persistence (survives reloads and navigation) ----
function loadSavedSort(key, fallback) {
  try {
    const saved = localStorage.getItem(key);
    return saved || fallback;
  } catch (e) { return fallback; }
}
function saveSort(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* private browsing etc — non-fatal */ }
}

el('stackSortBy').value = loadSavedSort('stacks:stackSort', 'genre-asc');
el('drillSortBy').value = loadSavedSort('stacks:drillSort', 'artist-asc');

el('stackSortBy').addEventListener('change', () => {
  saveSort('stacks:stackSort', el('stackSortBy').value);
  renderStacksGrid();
});
el('drillSortBy').addEventListener('change', () => {
  saveSort('stacks:drillSort', el('drillSortBy').value);
  renderDrillCards();
});
el('addBtnDrill').addEventListener('click', () => openModal(null));

function renderStacksGrid() {
  if (records.length === 0) {
    el('stacksGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1;">The crate is empty. Add your first record.</div>`;
    return;
  }

  const groups = {};
  records.forEach(r => {
    const key = r.genre || '__none__';
    (groups[key] = groups[key] || []).push(r);
  });

  const stackSort = el('stackSortBy').value;
  const entries = Object.entries(groups).sort((a, b) => {
    if (a[0] === '__none__') return 1;
    if (b[0] === '__none__') return -1;
    switch (stackSort) {
      case 'count-desc': return b[1].length - a[1].length;
      case 'count-asc': return a[1].length - b[1].length;
      default: return a[0].localeCompare(b[0]);
    }
  });

  el('stacksGrid').innerHTML = entries.map(([genre, list]) => {
    // Respect an explicit star, but otherwise prefer any record that
    // actually has cover art over just taking whichever came first —
    // a genre shouldn't show a blank tile when art exists in the group.
    const face = list.find(r => r.isFace) || list.find(r => r.coverUrl) || list[0];
    const label = genre === '__none__' ? 'No genre' : genre;
    const fallbackHtml = `<div class="face-fallback"><i class="ti ${iconForGenre(genre)}"></i></div>`;
    const faceInner = face.coverUrl
      ? `<img src="${escapeAttr(face.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='${fallbackHtml.replace(/"/g, '&quot;').replace(/'/g, "\\'")}'">`
      : fallbackHtml;

    // Pick real records for the back layers, preferring ones with cover art
    // so the stack reflects what's actually in the genre, not filler.
    // Layer count scales with how many records are actually in the genre —
    // bigger piles look bigger, capped at 3 back layers so it never gets messy.
    const layerCount = list.length >= 50 ? 3 : list.length >= 10 ? 2 : list.length >= 3 ? 1 : 0;
    const others = list.filter(r => r.id !== face.id);
    const withArt = others.filter(r => r.coverUrl);
    const withoutArt = others.filter(r => !r.coverUrl);
    const backLayers = [...withArt, ...withoutArt].slice(0, layerCount);

    const sleeveInner = r => r && r.coverUrl
      ? `<img src="${escapeAttr(r.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML=''">`
      : '';

    const badge = list.length > 9
      ? `<div class="stack-badge">${list.length > 99 ? '99+' : list.length}</div>`
      : '';

    return `
      <div class="stack-tile" onclick='exploreGenre(${JSON.stringify(genre)})'>
        <div class="stack-visual">
          ${backLayers[2] ? `<div class="stack-sleeve s4">${sleeveInner(backLayers[2])}</div>` : ''}
          ${backLayers[1] ? `<div class="stack-sleeve s3">${sleeveInner(backLayers[1])}</div>` : ''}
          ${backLayers[0] ? `<div class="stack-sleeve s2">${sleeveInner(backLayers[0])}</div>` : ''}
          <div class="stack-sleeve face-sleeve">${faceInner}</div>
          ${badge}
        </div>
        <div class="stack-label">
          <h3>${escapeHtml(label)}</h3>
          <div class="stack-count">${list.length} record${list.length === 1 ? '' : 's'}</div>
        </div>
      </div>
    `;
  }).join('');

  armLazyImageTimeouts(el('stacksGrid'));
}

function renderDrillCards() {
  const list = records.filter(r => drillGenre === '__none__' ? !r.genre : r.genre === drillGenre);
  const label = drillGenre === '__none__' ? 'No genre' : drillGenre;
  el('drillHeading').textContent = `${label} — ${list.length} record${list.length === 1 ? '' : 's'}`;

  const sortBy = el('drillSortBy').value;
  list.sort((a, b) => {
    switch (sortBy) {
      case 'artist-asc': return a.artist.localeCompare(b.artist);
      case 'year-desc': return (parseInt(b.year)||0) - (parseInt(a.year)||0);
      case 'year-asc': return (parseInt(a.year)||0) - (parseInt(b.year)||0);
      case 'value-desc': return (b.price||0) - (a.price||0);
      default: return (b.addedAt||0) - (a.addedAt||0);
    }
  });

  if (list.length === 0) {
    el('drillCards').innerHTML = `<div class="empty-state">No records in this genre yet.</div>`;
    return;
  }

  el('drillCards').innerHTML = list.map(r => {
    const tracks = r.tracklist ? r.tracklist.split('\n').filter(Boolean) : [];
    return `
    <div class="sleeve">
      <div class="row-actions">
        <button class="icon-btn edit" onclick='toggleFace("${r.id}")' title="${r.isFace ? 'Stack cover' : 'Set as stack cover'}"><i class="ti ti-star" style="${r.isFace ? 'color:var(--amber);' : ''}"></i></button>
        <button class="icon-btn edit" onclick='editRecord("${r.id}")' title="Edit"><i class="ti ti-pencil"></i></button>
        <button class="icon-btn" onclick='deleteRecord("${r.id}")' title="Delete"><i class="ti ti-trash"></i></button>
      </div>
      <div class="sleeve-layout">
        <div class="sleeve-main">
          <div style="display:flex; gap:10px;">
            ${r.coverUrl ? `<img src="${escapeAttr(r.coverUrl)}" alt="" loading="lazy" style="width:44px; height:44px; object-fit:cover; border-radius:2px; flex-shrink:0;" onerror="this.style.display='none'">` : ''}
            <div style="min-width:0;">
              <h3>${escapeHtml(r.album)}</h3>
              <div class="artist">${escapeHtml(r.artist)}</div>
              ${r.label ? `<div style="font-size:11px; color:#8a7d63; margin-top:2px;">${escapeHtml(r.label)}${r.catalogNumber ? ' · ' + escapeHtml(r.catalogNumber) : ''}</div>` : ''}
              <div class="eyebrow" style="margin-top:4px; margin-bottom:0;">${r.year || '—'} · ${r.format}${r.releaseType ? ' · ' + escapeHtml(r.releaseType) : ''}${r.country ? ' · ' + escapeHtml(r.country) : ''}</div>
            </div>
          </div>
          <div class="meta">
            <span class="chip condition-${r.condition}">${r.condition}</span>
            ${r.price ? `<span class="chip">$${r.price.toFixed(2)}</span>` : ''}
          </div>
        </div>
        ${tracks.length ? `
        <div class="sleeve-tracklist">
          <div class="tl-label">Track listing</div>
          <ol>${tracks.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ol>
        </div>` : ''}
      </div>
    </div>
  `;
  }).join('');

  armLazyImageTimeouts(el('drillCards'));
}

function renderPage() {
  renderStats();
  if (drillGenre) {
    el('stacksControls').style.display = 'none';
    el('drillControls').style.display = 'flex';
    el('stacksGrid').style.display = 'none';
    el('drillHeading').style.display = 'block';
    el('drillCards').style.display = 'grid';
    renderDrillCards();
  } else {
    renderStacksGrid();
  }
}
</script>
</body>
</html>
