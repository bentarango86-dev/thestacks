<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Stacks — Stacks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c2340">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="The Stacks" class="logo-mark">
    <div class="titles">
      <h1>The Stacks</h1>
      <p>your personal record ledger</p>
    </div>
    <div class="header-actions">
      <span id="userEmail" style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(12,35,64,0.55);"></span>
      <button class="btn btn-ghost" id="helpBtn" style="display:none;"><i class="ti ti-help-circle" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Help</button>
      <button class="btn btn-ghost" id="securityBtn" style="display:none;"><i class="ti ti-shield-lock" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Security</button>
      <button class="btn btn-ghost" id="exportBtn" style="display:none;"><i class="ti ti-download" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Export CSV</button>
      <button class="btn btn-ghost" id="signOutBtn" style="display:none;">Sign out</button>
    </div>
  </header>

  <div id="appBody" style="display:none;">

  <div class="view-tabs">
    <a href="index.html" class="tab-btn active"><i class="ti ti-stack-2" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>Stacks</a>
    <a href="records.html" class="tab-btn"><i class="ti ti-list" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>All Records</a>
  </div>

  <div class="home-search-row" id="homeSearchRow">
    <div class="home-search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="homeSearch" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button type="button" class="search-clear-btn" id="homeSearchClear" title="Clear search"><i class="ti ti-x"></i></button>
    </div>
    <div class="quick-row" id="homeQuickRow">
      <button type="button" class="chip-btn" id="randomBtn"><i class="ti ti-dice-5"></i>Random Record</button>
      <a href="#" class="chip-btn" id="continueBtn" style="display:none;"><i class="ti ti-history"></i><span id="continueLabel"></span></a>
      <button class="btn btn-primary" id="addBtn" style="margin-left:auto;">+ Add Record</button>
    </div>
  </div>

  <div class="controls" id="stacksControls">
    <select id="stackSortBy">
      <option value="genre-asc">Genre A–Z</option>
      <option value="count-desc">Most records</option>
      <option value="count-asc">Fewest records</option>
    </select>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <span>Loading your collection…</span>
  </div>

  <div id="searchResultsSection" style="display:none;">
    <h2 class="section-heading" id="searchResultsHeading"></h2>
    <div class="gallery-grid" id="searchResultsGrid"></div>
  </div>

  <div class="shelf" id="recentlyAddedShelf">
    <div class="shelf-label"><h3>Recently Added</h3></div>
    <div class="shelf-body">
      <div class="shelf-row" id="recentlyAddedRow"></div>
    </div>
    <div class="shelf-ledge"></div>
  </div>

  <div id="shelvesContainer"></div>
  </div>
</div>

<div id="modals-root"></div>

<script src="modals.js"></script>
<script src="app.js"></script>
<script>
// ---- STACKS PAGE ----
// (iconForGenre, buildShelfRow/buildShelfCover, openDetailModal live in app.js — shared with records.html)
// Everything renders in place now — no drill page, no navigation away from
// this screen just to look inside a genre.

function saveLastGenre(genre) {
  if (genre === 'recentlyAdded') return; // not a real shelf — nothing to "continue browsing" to
  try { localStorage.setItem('stacks:lastGenre', genre); } catch (e) { /* non-fatal */ }
}
function loadLastGenre() {
  try { return localStorage.getItem('stacks:lastGenre'); } catch (e) { return null; }
}

// ---- Sort persistence (survives reloads) ----
function loadSavedSort(key, fallback) {
  try { return localStorage.getItem(key) || fallback; } catch (e) { return fallback; }
}
function saveSort(key, value) {
  try { localStorage.setItem(key, value); } catch (e) { /* private browsing etc — non-fatal */ }
}

el('stackSortBy').value = loadSavedSort('stacks:stackSort', 'genre-asc');
el('stackSortBy').addEventListener('change', () => {
  saveSort('stacks:stackSort', el('stackSortBy').value);
  renderShelves();
});

function renderShelves() {
  const container = el('shelvesContainer');
  if (records.length === 0) {
    container.innerHTML = `
      <button type="button" class="empty-state-cta" onclick="openModal(null)">
        <i class="ti ti-plus"></i>
        The crate is empty — add your first record
      </button>`;
    return;
  }

  const groups = {};
  records.forEach(r => {
    const key = r.genre || '__none__';
    (groups[key] = groups[key] || []).push(r);
  });

  const stackSort = el('stackSortBy').value;
  const entries = Object.entries(groups).sort((a, b) => {
    if (a[0] === '__none__') return 1;
    if (b[0] === '__none__') return -1;
    switch (stackSort) {
      case 'count-desc': return b[1].length - a[1].length;
      case 'count-asc': return a[1].length - b[1].length;
      default: return a[0].localeCompare(b[0]);
    }
  });

  container.innerHTML = entries.map(([genre, list]) => {
    const label = genre === '__none__' ? 'No genre' : genre;
    return `
      <section class="shelf">
        <div class="shelf-label" id="shelfLabel-${escapeAttr(genre)}">
          <h3>${escapeHtml(label)}</h3>
          <span class="shelf-count">${list.length} record${list.length === 1 ? '' : 's'}</span>
        </div>
        <div class="shelf-body">
          <div class="shelf-row" id="shelfRow-${escapeAttr(genre)}"></div>
        </div>
        <div class="shelf-ledge"></div>
      </section>
    `;
  }).join('');

  // Newest records toward the front of each shelf — flipping through feels
  // like the crate itself, not an alphabetized catalog.
  entries.forEach(([genre, list]) => {
    const sorted = [...list].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
    buildShelfRow(document.getElementById('shelfRow-' + genre), sorted, genre);
  });
}

function renderRecentlyAdded() {
  const recent = [...records].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0)).slice(0, 10);
  if (recent.length === 0) {
    el('recentlyAddedShelf').style.display = 'none';
    return;
  }
  el('recentlyAddedShelf').style.display = 'block';
  buildShelfRow(el('recentlyAddedRow'), recent, 'recentlyAdded');
}

// ---- SEARCH (primary navigation on the homepage) ----
function renderSearchResults() {
  const q = el('homeSearch').value.trim().toLowerCase();
  if (!q) {
    el('searchResultsSection').style.display = 'none';
    el('recentlyAddedShelf').style.display = records.length ? 'block' : 'none';
    el('shelvesContainer').style.display = 'block';
    return true; // no query — caller should render the normal homepage
  }
  const matches = records.filter(r => recordMatchesQuery(r, q));
  el('recentlyAddedShelf').style.display = 'none';
  el('shelvesContainer').style.display = 'none';
  el('searchResultsSection').style.display = 'block';
  el('searchResultsHeading').innerHTML = `
    ${matches.length} result${matches.length === 1 ? '' : 's'}
    <a href="records.html?q=${encodeURIComponent(el('homeSearch').value.trim())}" class="section-heading-link">Refine with filters in All Records <i class="ti ti-arrow-right"></i></a>
  `;
  renderGalleryGrid(el('searchResultsGrid'), matches);
  return false;
}
el('homeSearch').addEventListener('input', debounce(() => { renderSearchResults(); }, 150));
wireSearchClear('homeSearch', 'homeSearchClear', renderSearchResults);

el('randomBtn').addEventListener('click', openRandomRecord);

el('continueBtn').addEventListener('click', e => {
  e.preventDefault();
  const genre = el('continueBtn').dataset.genre;
  const label = el('shelfLabel-' + genre);
  if (!label) return;
  label.scrollIntoView({ behavior: 'smooth', block: 'center' });
  label.classList.remove('flash');
  void label.offsetWidth; // restart the animation if it's already been triggered once
  label.classList.add('flash');
});

function renderPage() {
  renderStats();
  el('homeSearch').placeholder = `Search within your ${records.length} record${records.length === 1 ? '' : 's'}`;

  const lastGenre = loadLastGenre();
  const lastGenreStillExists = lastGenre && records.some(r => (r.genre || '') === lastGenre || (lastGenre === '__none__' && !r.genre));
  if (lastGenreStillExists) {
    el('continueLabel').textContent = `Continue browsing ${lastGenre === '__none__' ? 'No genre' : lastGenre}`;
    el('continueBtn').dataset.genre = lastGenre;
    el('continueBtn').style.display = 'inline-flex';
  } else {
    el('continueBtn').style.display = 'none';
  }

  if (renderSearchResults()) {
    renderRecentlyAdded();
    renderShelves();
  }
}
</script>
</body>
</html>
