<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Stacks — All Records</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c2340">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Stacks">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="The Stacks" class="logo-mark">
    <div class="titles">
      <h1>The Stacks</h1>
      <p>your personal record ledger</p>
    </div>
    <div class="header-actions">
      <span id="userEmail" style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(12,35,64,0.55);"></span>
      <button class="btn btn-ghost" id="helpBtn" style="display:none;"><i class="ti ti-help-circle" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Help</button>
      <button class="btn btn-ghost" id="securityBtn" style="display:none;"><i class="ti ti-shield-lock" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Security</button>
      <button class="btn btn-ghost" id="exportBtn" style="display:none;"><i class="ti ti-download" style="font-size:15px; vertical-align:-2px; margin-right:3px;"></i>Export CSV</button>
      <button class="btn btn-ghost" id="signOutBtn" style="display:none;">Sign out</button>
    </div>
  </header>

  <div id="appBody" style="display:none;">

  <div class="stats" id="stats"></div>

  <div class="view-tabs">
    <a href="index.html" class="tab-btn"><i class="ti ti-stack-2" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>Stacks</a>
    <a href="records.html" class="tab-btn active"><i class="ti ti-list" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>All Records</a>
  </div>

  <div class="controls">
    <div class="search-input-wrap">
      <input type="text" id="search" name="stacks-record-search" placeholder="Search artist, album, or genre…" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button type="button" class="search-clear-btn" id="searchClear" title="Clear search"><i class="ti ti-x"></i></button>
    </div>
    <select id="filterGenre"><option value="">All genres</option></select>
    <select id="filterYear"><option value="">All years</option></select>
    <select id="filterFormat"><option value="">All formats</option></select>
    <select id="filterCondition"><option value="">All conditions</option></select>
    <select id="filterCountry"><option value="">All countries</option></select>
    <select id="filterLabel"><option value="">All labels</option></select>
    <button class="btn btn-primary" id="addBtn">+ Add Record</button>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <span>Loading your collection…</span>
  </div>

  <div class="crate" id="crate"></div>
  </div>
</div>

<div id="modals-root"></div>

<script src="modals.js"></script>
<script src="app.js"></script>
<script>
// ---- ALL RECORDS PAGE ----
const crate = el('crate');

function loadSavedTableSort() {
  try {
    const saved = localStorage.getItem('stacks:tableSort');
    if (saved) return JSON.parse(saved);
  } catch (e) { /* private browsing etc — fall through to default */ }
  return { key: 'addedAt', dir: 'desc' };
}
function saveTableSort() {
  try { localStorage.setItem('stacks:tableSort', JSON.stringify(tableSort)); } catch (e) { /* non-fatal */ }
}

let tableSort = loadSavedTableSort();

function sortByColumn(key) {
  if (tableSort.key === key) {
    tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    tableSort.key = key;
    tableSort.dir = (key === 'album' || key === 'artist' || key === 'genre' || key === 'format') ? 'asc' : 'desc';
  }
  saveTableSort();
  renderFlatCrate();
}

function populateFilterOptions() {
  const populate = (id, values, current) => {
    const el_ = el(id);
    el_.innerHTML = `<option value="">${el_.dataset.allLabel}</option>` +
      values.map(v => `<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`).join('');
    el_.value = current;
  };
  const uniq = key => [...new Set(records.map(r => r[key]).filter(Boolean))].sort();

  el('filterYear').dataset.allLabel = 'All years';
  el('filterFormat').dataset.allLabel = 'All formats';
  el('filterCondition').dataset.allLabel = 'All conditions';
  el('filterCountry').dataset.allLabel = 'All countries';
  el('filterLabel').dataset.allLabel = 'All labels';

  populate('filterYear', uniq('year').sort((a,b) => b - a), el('filterYear').value);
  populate('filterFormat', uniq('format'), el('filterFormat').value);
  populate('filterCondition', uniq('condition'), el('filterCondition').value);
  populate('filterCountry', uniq('country'), el('filterCountry').value);
  populate('filterLabel', uniq('label'), el('filterLabel').value);
}

function renderFlatCrate() {
  populateFilterOptions();

  const search = el('search').value.toLowerCase();
  const genreFilter = el('filterGenre').value;
  const yearFilter = el('filterYear').value;
  const formatFilter = el('filterFormat').value;
  const conditionFilter = el('filterCondition').value;
  const countryFilter = el('filterCountry').value;
  const labelFilter = el('filterLabel').value;

  let list = records.filter(r => {
    const matchesSearch = !search ||
      r.album.toLowerCase().includes(search) ||
      r.artist.toLowerCase().includes(search) ||
      (r.genre || '').toLowerCase().includes(search);
    const matchesGenre = !genreFilter ||
      (genreFilter === '__none__' ? !r.genre : r.genre === genreFilter);
    const matchesYear = !yearFilter || r.year === yearFilter;
    const matchesFormat = !formatFilter || r.format === formatFilter;
    const matchesCondition = !conditionFilter || r.condition === conditionFilter;
    const matchesCountry = !countryFilter || r.country === countryFilter;
    const matchesLabel = !labelFilter || r.label === labelFilter;
    return matchesSearch && matchesGenre && matchesYear && matchesFormat &&
           matchesCondition && matchesCountry && matchesLabel;
  });

  const { key, dir } = tableSort;
  const mult = dir === 'asc' ? 1 : -1;
  list.sort((a, b) => {
    switch (key) {
      case 'album': return a.album.localeCompare(b.album) * mult;
      case 'artist': return a.artist.localeCompare(b.artist) * mult;
      case 'genre': return (a.genre || '').localeCompare(b.genre || '') * mult;
      case 'format': return (a.format || '').localeCompare(b.format || '') * mult;
      case 'year': return ((parseInt(a.year)||0) - (parseInt(b.year)||0)) * mult;
      case 'price': return ((a.price||0) - (b.price||0)) * mult;
      case 'condition': return (a.condition || '').localeCompare(b.condition || '') * mult;
      default: return ((a.addedAt||0) - (b.addedAt||0)) * mult;
    }
  });

  if (list.length === 0) {
    crate.innerHTML = records.length === 0
      ? `<button type="button" class="empty-state-cta" onclick="openModal(null)"><i class="ti ti-plus"></i>The crate is empty — add your first record</button>`
      : `<div class="empty-state">No records match.</div>`;
    return;
  }

  const arrow = k => tableSort.key === k ? `<span class="sort-arrow">${tableSort.dir === 'asc' ? '▲' : '▼'}</span>` : '';
  const columns = [
    ['album', 'Album'], ['artist', 'Artist'], ['year', 'Year'],
    ['genre', 'Genre'], ['format', 'Format'], ['condition', 'Cond.'], ['price', 'Price']
  ];

  crate.innerHTML = `
    <div class="table-wrap">
    <table class="records-table">
      <thead><tr>
        <th></th>
        ${columns.map(([k, label]) => `<th onclick='sortByColumn("${k}")'>${label}${arrow(k)}</th>`).join('')}
        <th>Label</th>
        <th></th>
        <th></th>
      </tr></thead>
      <tbody>
        ${list.map(r => {
          const tracks = r.tracklist ? r.tracklist.split('\n').filter(Boolean) : [];
          return `
          <tr>
            <td style="cursor:pointer;" onclick='openDetailModal("${r.id}")'>${r.coverUrl
              ? `<img class="thumb img-loading" src="${escapeAttr(r.coverUrl)}" alt="" loading="lazy" onload="this.classList.remove('img-loading')" onerror="this.outerHTML='<div class=&quot;thumb-fallback&quot;><i class=&quot;ti ti-music&quot;></i></div>'">`
              : `<div class="thumb-fallback"><i class="ti ti-music"></i></div>`}</td>
            <td class="cell-album" style="cursor:pointer;" onclick='openDetailModal("${r.id}")'>${escapeHtml(r.album)}</td>
            <td class="cell-artist">${escapeHtml(r.artist)}</td>
            <td class="cell-muted">${r.year || '—'}</td>
            <td class="cell-muted">${escapeHtml(r.genre || '—')}</td>
            <td class="cell-muted">${escapeHtml(r.format || '—')}</td>
            <td class="cell-muted">${escapeHtml(r.condition || '—')}</td>
            <td class="cell-muted">${r.price ? '$' + r.price.toFixed(2) : '—'}</td>
            <td class="cell-muted">${escapeHtml(r.label || '—')}</td>
            <td>${tracks.length ? `<button class="row-btn" onclick='openTrackModal("${r.id}")' title="View track listing"><i class="ti ti-list-details" style="vertical-align:-2px;"></i> ${tracks.length}</button>` : ''}</td>
            <td class="row-actions-cell">
              <button class="row-btn star ${r.isFace ? 'active' : ''}" onclick='toggleFace("${r.id}")' title="${r.isFace ? 'Stack cover' : 'Set as stack cover'}"><i class="ti ti-star"></i></button>
              <button class="row-btn" onclick='editRecord("${r.id}")' title="Edit"><i class="ti ti-pencil"></i></button>
              <button class="row-btn danger" onclick='deleteRecord("${r.id}")' title="Delete"><i class="ti ti-trash"></i></button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  `;

  armLazyImageTimeouts(crate);
}

function openTrackModal(id) {
  const r = records.find(x => x.id === id);
  if (!r || !r.tracklist) return;
  el('trackModalAlbum').textContent = r.album;
  el('trackModalArtist').textContent = r.artist;
  el('trackModalList').innerHTML = r.tracklist.split('\n').filter(Boolean)
    .map(t => `<li>${escapeHtml(t)}</li>`).join('');
  el('trackOverlay').classList.add('open');
}
el('trackCloseBtn').addEventListener('click', () => el('trackOverlay').classList.remove('open'));
el('trackOverlay').addEventListener('click', e => {
  if (e.target === el('trackOverlay')) el('trackOverlay').classList.remove('open');
});

function renderPage() {
  renderStats();
  renderGenreFilter();
  renderFlatCrate();
}

el('search').addEventListener('input', debounce(renderFlatCrate, 150));
wireSearchClear('search', 'searchClear', renderFlatCrate);
el('filterGenre').addEventListener('change', renderFlatCrate);
el('filterYear').addEventListener('change', renderFlatCrate);
el('filterFormat').addEventListener('change', renderFlatCrate);
el('filterCondition').addEventListener('change', renderFlatCrate);
el('filterCountry').addEventListener('change', renderFlatCrate);
el('filterLabel').addEventListener('change', renderFlatCrate);

// Arrived here from a stack tile — pre-filter to that genre.
const urlParams = new URLSearchParams(window.location.search);
const genreParam = urlParams.get('genre');
if (genreParam) {
  const applyGenreFilter = () => {
    el('filterGenre').value = genreParam;
    tableSort = { key: 'artist', dir: 'asc' };
    renderFlatCrate();
  };
  const originalRenderPage = renderPage;
  renderPage = function() {
    renderStats();
    renderGenreFilter();
    applyGenreFilter();
  };
}
</script>
</body>
</html>
